<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Splitter</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="Icons/favicon.ico">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

  <div class="app">

    <header>
      <div class="top-header">
        <h1><img src="/Icons/LOGO.jpg" alt="LOGO"><span>Money Splitter</span></h1>
          <button class="reset-btn btn-primary">Reset</button>
      </div>
    </header>

  <div class="desktop">

    <!-- TAB: People -->
    <section class="tab-screen active" id="tab-people">
      <header class="screen-header">
        <h2>People: <span class="badge addedPeopleCounter">0</span></h2>
        <button id="themeToggle" class="icon-btn"><i class="bi bi-moon-fill"></i></button>
      </header>

      <div class="add-person">
        <input type="text" placeholder="Enter name…" maxlength="30"/>
        <button class="btn-primary">Add</button>
      </div>

      <h2 class="section-label">Balances</h2>
      <div class="scroll-area">
        <ul class="people-list">
          <li class="empty-state">No people added yet</li>
        </ul>
      </div>
    </section>

    <!-- TAB: Add Expense -->
    <section class="tab-screen" id="tab-add">
      <header class="screen-header">
        <h2>Add Expense</h2>
      </header>

      <div class="expense-form">
        <label>Who paid?</label>
        <select>
          <option>—</option>
        </select>

        <label>Description</label>
        <input class="goal" type="text" placeholder="What was it for?" maxlength="100"/>

        <label>Amount</label>
        <input class="amount" type="number" placeholder="0.00" inputmode="decimal" maxlength="10"/>

        <button class="addExpense-btn btn-primary">Add Expense</button>
      </div>
    </section>

    <!-- TAB: History -->
    <section class="tab-screen" id="tab-history">
      <header class="screen-header">
        <h2>History <span class="badge expensesCount">0</span></h2>
      </header>

      <div class="scroll-area history-btn">
        <ul class="expenses-list">
          <li class="empty-state">No expenses yet</li>
        </ul>
      </div>
    </section>

    <!-- TAB: Chart -->
    <section class="tab-screen" id="tab-chart">
      <header class="screen-header">
        <h2>Chart</h2>
      </header>

      <div class="graf">
        <canvas id="lineChart"></canvas>
      </div>
    </section>

  </div>

    <!-- Bottom Navigation -->
    <nav class="navigation">
      <button class="nav-item active" data-tab="tab-people">
        <span class="nav-icon"><i class="bi bi-credit-card"></i></span>
        <span class="nav-label">People</span>
      </button>
      <button class="nav-item" data-tab="tab-add">
        <span class="nav-icon add-icon"><i class="bi bi-plus-circle"></i></span>
        <span class="nav-label">Add</span>
      </button>
      <button class="nav-item" data-tab="tab-history">
        <span class="nav-icon"><i class="bi bi-card-list"></i></span>
        <span class="nav-label">History</span>
      </button>
      <button class="nav-item" data-tab="tab-chart">
        <span class="nav-icon"><i class="bi bi-graph-up"></i></span>
        <span class="nav-label">Chart</span>
      </button>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="logic.js"></script>
  <script src="main.js"></script>

</body>
</html>
